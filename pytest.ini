# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto al ejecutar pytest
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-fail-under=80

# Ignorar advertencias de terceros
filterwarnings =
    ignore::DeprecationWarning